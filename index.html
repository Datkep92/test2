<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>PWA Test</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PWA Test">

<meta name="theme-color" content="#2196f3">

<link rel="manifest" href="manifest.json">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
}

.header{
    padding:env(safe-area-inset-top) 20px 20px;
    background:#2196f3;
    color:#fff;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.btn{
    width:100%;
    border:none;
    background:#2196f3;
    color:#fff;
    padding:15px;
    border-radius:10px;
    font-size:16px;
    margin-top:10px;
}

.status{
    margin-top:15px;
    padding:10px;
    border-radius:8px;
    background:#eee;
}

.fullscreen{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    padding:15px;
    text-align:center;
    background:#fff;
    border-top:1px solid #ddd;
}
</style>
</head>
<body>

<div class="header">
    <h1>PWA TEST</h1>
    <p>Kiểm tra ẩn URL trên iPhone</p>
</div>

<div class="container">

    <div class="card">
        <h3>Trạng thái ứng dụng</h3>
        <div id="mode" class="status">Đang kiểm tra...</div>
    </div>

    <div class="card">
        <h3>Thông tin thiết bị</h3>
        <div id="device"></div>
    </div>

    <div class="card">
        <button class="btn" onclick="alert('PWA hoạt động bình thường')">
            Test Nút Bấm
        </button>
    </div>

</div>

<div class="fullscreen">
    Nếu đang thấy thanh URL → hãy thêm vào Màn hình chính rồi mở lại từ icon.
</div>

<script>
function checkPWA() {
    const mode = document.getElementById("mode");

    const isStandalone =
        window.navigator.standalone ||
        window.matchMedia("(display-mode: standalone)").matches;

    if (isStandalone) {
        mode.innerHTML = `
            <b>✅ ĐANG CHẠY DẠNG APP</b><br>
            Thanh URL đã được ẩn.
        `;
    } else {
        mode.innerHTML = `
            <b>⚠️ ĐANG CHẠY TRONG SAFARI</b><br>
            Thanh URL vẫn hiển thị.
        `;
    }
}

document.getElementById("device").innerHTML = `
    User Agent:<br><br>
    ${navigator.userAgent}
`;

checkPWA();
</script>

</body>
</html>
